id: org.melodymaestro.Game
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: melody-maestro
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --share=network
modules:
  - name: melody-maestro
    buildsystem: simple
    build-commands:
      - install -D bin/melody-maestro /app/bin/melody-maestro
    sources:
      - type: dir
        path: .
